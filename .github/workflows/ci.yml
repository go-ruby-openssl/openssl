name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Track the latest stable Go (org convention). go.mod floor is 1.26.4.
jobs:
  # Build, vet, race-test, and enforce 100% coverage on all three OSes. The
  # test suite is deterministic and ruby-free: every parity check uses a
  # hard-coded crypto vector or a committed PEM/DER fixture, so it runs
  # identically on Linux, macOS and Windows.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 30
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Windows binary build gate: confirms the CGO=0 pure-Go build cross-compiles
  # for Windows from Linux (the host-seam SSL config and all crypto/* paths).
  windows-build:
    name: windows build (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: GOOS=windows CGO_ENABLED=0 go build ./...

  # Validate the library on the six supported 64-bit targets. amd64/arm64 run
  # natively; the rest run the suite under qemu-user.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH && CGO_ENABLED=0 go test ./...

  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x, qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Test under qemu (${{ matrix.goarch }})
        run: GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go test -exec=${{ matrix.qemu }} ./...
